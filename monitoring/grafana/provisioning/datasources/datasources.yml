# Grafana Datasource Auto-Provisioning for DevGuard-AI
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: PBFA97CFB590B2093
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: P8E80F9AEF21F6940
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
